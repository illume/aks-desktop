name: Screen Reader Tests (Windows / NVDA)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  sr-test-nvda:
    name: NVDA Screen Reader Tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins/aks-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: plugins/aks-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup NVDA screen reader
        uses: guidepup/setup-action@4aa2ebd687ff687a31d7c17184beac3c606d64cd # 0.19.0

      - name: Run guidepup screen reader tests
        continue-on-error: true # NVDA may not be available on all CI runners
        run: npx vitest run -c node_modules/@kinvolk/headlamp-plugin/config/vite.config.mjs --hookTimeout 30000 --testTimeout 30000 "guidepup"
        env:
          SCREEN_READER: nvda
          UNDER_TEST: 'true'
